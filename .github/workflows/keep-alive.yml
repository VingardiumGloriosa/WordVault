name: Keep Supabase Alive

on:
  schedule:
    - cron: "0 8 * * *"        # daily at 08:00 UTC
  workflow_dispatch:

permissions:
  contents: write              # needed so the keepalive step can push

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ping Supabase
        run: |
          curl -fsS --retry 3 --retry-delay 5 \
            "$SUPABASE_URL/rest/v1/saved_words?select=id&limit=1" \
            -H "apikey: $SUPABASE_KEY" \
            -H "Authorization: Bearer $SUPABASE_KEY"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      - name: Keep workflow alive (commit only if repo idle ≥ 45 days)
        if: always()           # run even if the ping failed, so the cron survives
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          LAST=$(git log -1 --format=%ct)
          DAYS=$(( ( $(date +%s) - LAST ) / 86400 ))
          echo "Days since last commit: $DAYS"
          if [ "$DAYS" -ge 45 ]; then
            git commit --allow-empty -m "chore: keepalive [skip ci]"
            git push
          fi

      - name: Notify on failure
        if: failure()
        run: |
          curl -fsS -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"⚠️ Supabase keep-alive failed in ${{ github.repository }} — likely paused. Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
